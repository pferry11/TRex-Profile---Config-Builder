var tests = [];
function test(name, fn) { tests.push({ name: name, fn: fn }); }

function goldenTest(name, fixture, golden, expectFile) {
  test(name, function () {
    var r = gen(fixture, NOW);
    if (r.warnings.length) { return { pass: false, detail: 'unexpected warnings: ' + r.warnings.join(' | ') }; }
    if (r.files[0].name !== expectFile) { return { pass: false, detail: 'file name ' + r.files[0].name + ' != ' + expectFile }; }
    if (r.files[0].content === golden) { return { pass: true }; }
    return { pass: false, detail: firstDiff(golden, r.files[0].content) };
  });
}

function firstDiff(exp, act) {
  var e = exp.split('\n'), a = act.split('\n');
  for (var i = 0; i < Math.max(e.length, a.length); i++) {
    if (e[i] !== a[i]) {
      return 'first difference at line ' + (i + 1) + ':\n' +
        '<span class="exp">expected: ' + TB.util.escapeHtml(JSON.stringify(e[i])) + '</span>\n' +
        '<span class="act">actual:   ' + TB.util.escapeHtml(JSON.stringify(a[i])) + '</span>';
    }
  }
  return 'contents differ only in length';
}

var clgen = TB.gen.resolve('3.06', 'cli');

function cliModel(over) {
  var m = { kind: 'cli', schemaVersion: 1, trexVersion: '3.06', meta: { name: 'test' },
    mode: 'astf', cfgPath: '/etc/trex_cfg.yaml', cores: 8, mult: 2, durationSec: 60,
    latencyPps: null, flowPortAffinity: false, astfServerOnly: false, astfClientMask: null,
    profile: 'two_server.py', extraArgs: '', trexDir: '/opt/trex/v3.06' };
  for (var k in over) { if (Object.prototype.hasOwnProperty.call(over, k)) { m[k] = over[k]; } }
  return m;
}

test('cli table: command lines per mode', function () {
  var cases = [
    [cliModel({ astfClientMask: '0x1' }),
     'sudo ./t-rex-64 -i --astf --cfg /etc/trex_cfg.yaml -c 8 --astf-client-mask 0x1'],
    [cliModel({ astfServerOnly: true, mult: 1 }),
     'sudo ./t-rex-64 -i --astf --cfg /etc/trex_cfg.yaml -c 8 --astf-server-only'],
    [cliModel({ mode: 'stl', profile: 'imix_like.py', cores: 4 }),
     'sudo ./t-rex-64 -i --stl --cfg /etc/trex_cfg.yaml -c 4'],
    [cliModel({ mode: 'legacy', profile: 'cap2/dns.yaml', mult: 5, durationSec: 3600,
                latencyPps: 1000, flowPortAffinity: true, cores: 4 }),
     'sudo ./t-rex-64 -f cap2/dns.yaml --cfg /etc/trex_cfg.yaml -c 4 -m 5 -d 3600 -l 1000 -p'],
    [cliModel({ extraArgs: '--no-scapy-server', astfClientMask: '0x3' }),
     'sudo ./t-rex-64 -i --astf --cfg /etc/trex_cfg.yaml -c 8 --astf-client-mask 0x3 --no-scapy-server']
  ];
  for (var i = 0; i < cases.length; i++) {
    var r = clgen(cases[i][0], NOW);
    if (r.command !== cases[i][1]) {
      return { pass: false, detail: 'case ' + i + ':\n<span class="exp">expected: ' +
        TB.util.escapeHtml(cases[i][1]) + '</span>\n<span class="act">actual:   ' +
        TB.util.escapeHtml(r.command) + '</span>' };
    }
  }
  return { pass: true };
});

test('cli console: interactive start lines and server-only note', function () {
  var r = clgen(cliModel({ astfClientMask: '0x1' }), NOW);
  var c = r.files[1].content;
  if (c.indexOf('trex> start -f two_server.py -m 2 -d 60 --client_mask 0x1') === -1) {
    return { pass: false, detail: 'astf console: ' + TB.util.escapeHtml(c) };
  }
  r = clgen(cliModel({ mode: 'stl', profile: 'p.py', mult: 1 }), NOW);
  if (r.files[1].content.indexOf('trex> start -f p.py -a -m 1 -d 60') === -1) {
    return { pass: false, detail: 'stl console: ' + TB.util.escapeHtml(r.files[1].content) };
  }
  r = clgen(cliModel({ astfServerOnly: true, mult: 1 }), NOW);
  var ok = r.files[1].content.indexOf('start -f') === -1 &&
           r.files[1].content.indexOf('answers connections only') !== -1;
  if (!ok) { return { pass: false, detail: 'server-only console should have no start line' }; }
  r = clgen(cliModel({ mode: 'legacy', profile: 'x.yaml', mult: 1 }), NOW);
  return { pass: r.files.length === 1, detail: 'legacy mode should emit only run_*.sh' };
});

/* ================= summary suite ================= */

test('summary: CLI restated in English', function () {
  var s = TB.gen.summary(cliModel({ astfClientMask: '0x1' }));
  var ok = s.length === 2 &&
    s[0] === 'Starts TRex interactively in ASTF mode with 8 cores using /etc/trex_cfg.yaml as the client side on port mask 0x1.' &&
    s[1] === 'The console then starts two_server.py at -m 2 for 60 s.';
  return { pass: ok, detail: TB.util.escapeHtml(JSON.stringify(s)) };
});

test('summary: cap2 dyn_pyload described in words', function () {
  var m = cap2Model('dynsum');
  m.capInfo[0].dynPyload = [{ pktId: 1, pyldOffset: 16, type: 1, len: 4, mask: '0xffffffff' }];
  var s = TB.gen.summary(m).join(' | ');
  var ok = s.indexOf('rewrites 4 uint32s at payload offset 16 of packet 1 with the client IP (mask 0xffffffff)') !== -1;
  return { pass: ok, detail: TB.util.escapeHtml(s) };
});

test('summary: ASTF program template described in words', function () {
  var s = TB.gen.summary(fxAstfProgram).join(' | ');
  var ok = s.indexOf('client sends an HTTP request, receives the peer payload') !== -1 &&
    s.indexOf('server receives the peer payload, sends an HTTP response with a 32768-byte body') !== -1;
  return { pass: ok, detail: TB.util.escapeHtml(s) };
});

test('summary: scenario runbooks gain WHAT THE PROFILE DOES section', function () {
  var r = TB.scenarios.buildRamp({ engine: 'stl', name: 'ramp_sum', low: 100, mid: 500, high: 1000, stageSec: 30, now: '2026-07-06' });
  if (!r.ok) { return { pass: false, detail: r.errors.join(' | ') }; }
  var rb = r.files[1].content;
  var ok = rb.indexOf('WHAT THE PROFILE DOES') !== -1 &&
    rb.indexOf('  - S_low: transmits continuously at 100 pps') !== -1;
  return { pass: ok, detail: TB.util.escapeHtml(rb.slice(rb.indexOf('WHAT'), rb.indexOf('WHAT') + 300)) };
});

test('summary: unknown kind/version returns empty (no crash)', function () {
  var ok = TB.gen.summary(null).length === 0 &&
    TB.gen.summary({ kind: 'mystery' }).length === 0 &&
    TB.gen.summary({ kind: 'stl', trexVersion: '9.99', streams: [] }).length === 0;
  return { pass: ok, detail: '' };
});

test('cli warnings: cfg missing, server-only+mult, stl -l, bad mask, both flags', function () {
  var fails = [];
  if (!clgen(cliModel({ cfgPath: '' }), NOW).warnings.some(function (x) { return x.indexOf('No --cfg path') !== -1; })) { fails.push('cfg'); }
  if (!clgen(cliModel({ astfServerOnly: true, mult: 2 }), NOW).warnings.some(function (x) { return x.indexOf('-m has no effect') !== -1; })) { fails.push('server+mult'); }
  if (!clgen(cliModel({ mode: 'stl', latencyPps: 500 }), NOW).warnings.some(function (x) { return x.indexOf('does not use -l') !== -1; })) { fails.push('stl-l'); }
  if (!clgen(cliModel({ astfClientMask: 'xyz' }), NOW).warnings.some(function (x) { return x.indexOf('not valid hex') !== -1; })) { fails.push('mask'); }
  var r = clgen(cliModel({ astfServerOnly: true, astfClientMask: '0x1', mult: 1 }), NOW);
  if (!r.warnings.some(function (x) { return x.indexOf('mutually exclusive') !== -1; }) ||
      r.command.indexOf('--astf-server-only') === -1 || r.command.indexOf('client-mask') !== -1) { fails.push('both'); }
  return { pass: !fails.length, detail: fails.join(', ') };
});

test('cfg warnings: thread collision, core excess, mixed modes, iface count, cross-wiring', function () {
  var fails = [];
  var s = srvMac(); s.platform.latencyThreadId = 3;
  if (!cgen(s).warnings.some(function (x) { return x.indexOf('latency_thread_id 3 is also listed') !== -1; })) { fails.push('thread-collision'); }
  s = srvMac(); s.cores = 10;
  if (!cgen(s).warnings.some(function (x) { return x.indexOf('exceeds the 6 thread(s)') !== -1; })) { fails.push('core-excess'); }
  s = srvIp(); s.ports[1] = { mode: 'mac', srcMac: '00:00:00:00:00:01', destMac: '00:00:00:00:00:02' };
  if (!cgen(s).warnings.some(function (x) { return x.indexOf('mix MAC and IP mode') !== -1; })) { fails.push('mixed-modes'); }
  s = srvIp(); s.interfaces = ['03:00.0'];
  if (!cgen(s).warnings.some(function (x) { return x.indexOf('port_limit is 2 but 1 interface') !== -1; })) { fails.push('iface-count'); }
  s = srvMac(); s.ports[1].srcMac = '00:0c:29:55:37:aa';
  if (!cgen(s).warnings.some(function (x) { return x.indexOf('not cross-wired') !== -1; })) { fails.push('cross-wiring'); }
  return { pass: !fails.length, detail: fails.join(', ') };
});

/* ---------------- run ---------------- */
var results = document.getElementById('results');
var passCount = 0;
tests.forEach(function (t) {
  var out;
  try { out = t.fn(); }
  catch (e) { out = { pass: false, detail: 'threw: ' + TB.util.escapeHtml(e.message) }; }
  var div = document.createElement('div');
  div.className = 'test ' + (out.pass ? 'pass' : 'fail');
  div.innerHTML = (out.pass ? 'PASS ' : 'FAIL ') + TB.util.escapeHtml(t.name) +
    (out.pass || !out.detail ? '' : '<pre class="diff">' + out.detail + '</pre>');
  results.appendChild(div);
  if (out.pass) { passCount++; }
});
document.getElementById('summary').textContent = passCount + ' / ' + tests.length + ' tests passed';
document.getElementById('summary').style.color = passCount === tests.length ? '#3fb950' : '#f85149';
</script>
