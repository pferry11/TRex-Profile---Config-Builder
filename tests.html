    id: 's1', name: 'S0', enabled: true,
    packet: {
      l2: { srcMac: null, dstMac: null },
      vlan: { enabled: false, id: 100, prio: 0 },
      l3: { type: 'ipv4', src: '16.0.0.1', dst: '48.0.0.1', tos: null, ttl: null },
      l4: { type: 'udp', sport: 1025, dport: 12, tcpFlags: null },

    mode: { type: 'cont', pps: 100, totalPkts: null, pktsPerBurst: null, ibgUsec: null, count: null },
    isgUsec: 0,
    chain: { selfStart: true, next: null, actionCount: null },
    vm: { cacheSize: null, vars: [], tuple: null },
    flowStats: { type: 'none', pgId: null, addPortId: false }

}
function model(name, streams, tunables) {
  return { kind: 'stl', schemaVersion: 1, trexVersion: '3.06',
           meta: { name: name, description: '', modified: '' },
           tunables: tunables || [], streams: streams };

'import argparse\n' +
'\n\n' +

/* ---------------- test runner ---------------- */
var tests = [];
function test(name, fn) { tests.push({ name: name, fn: fn }); }

function goldenTest(name, fixture, golden, expectFile) {
  test(name, function () {
    var r = gen(fixture, NOW);
    if (r.warnings.length) { return { pass: false, detail: 'unexpected warnings: ' + r.warnings.join(' | ') }; }
    if (r.files[0].name !== expectFile) { return { pass: false, detail: 'file name ' + r.files[0].name + ' != ' + expectFile }; }
    if (r.files[0].content === golden) { return { pass: true }; }
    return { pass: false, detail: firstDiff(golden, r.files[0].content) };
  });
}

function firstDiff(exp, act) {
  var e = exp.split('\n'), a = act.split('\n');
  for (var i = 0; i < Math.max(e.length, a.length); i++) {
    if (e[i] !== a[i]) {
      return 'first difference at line ' + (i + 1) + ':\n' +
        '<span class="exp">expected: ' + TB.util.escapeHtml(JSON.stringify(e[i])) + '</span>\n' +
        '<span class="act">actual:   ' + TB.util.escapeHtml(JSON.stringify(a[i])) + '</span>';
    }
  }
  return 'contents differ only in length';
}

goldenTest('golden: minimal cont UDP with size tunable (udp_1pkt_simple-like)', fxMinimal, goldenMinimal, 'udp_simple.py');
goldenTest('golden: 3-stream IMIX with VM vars (imix-like)', fxImix, goldenImix, 'imix_like.py');
goldenTest('golden: chained single-burst -> multi-burst (multi_burst_2st_1000pkt-like)', fxChained, goldenChained, 'burst_chain.py');
goldenTest('golden: latency flow-stats with port_id pg_id (flow_stats_latency-like)', fxLatency, goldenLatency, 'latency_stream.py');

test('round-trip: model -> JSON -> parse -> regenerate identical', function () {
  var once = gen(fxImix, NOW).files[0].content;
  var twice = gen(JSON.parse(JSON.stringify(fxImix)), NOW).files[0].content;
  return { pass: once === twice, detail: once === twice ? '' : firstDiff(once, twice) };
});

test('warning: frame size below 60 bytes', function () {
  var m = JSON.parse(JSON.stringify(fxMinimal));
  m.tunables = [];
  m.streams[0].packet.payload.frameSizeTunable = null;
  m.streams[0].packet.payload.frameSize = 40;
  var w = gen(m, NOW).warnings;
  var ok = w.some(function (x) { return x.indexOf('below 60 bytes') !== -1; });
  return { pass: ok, detail: 'warnings: ' + w.join(' | ') };
});

});

  var s = baseStream();
  s.vm.tuple = { name: 'tuple', ipMin: '16.0.0.1', ipMax: '16.0.0.2',
    portMin: 1025, portMax: 2048, limitFlows: 10000, writeIpTo: 'IP.src', writePortTo: 'UDP.sport' };
  var c = gen(model('tuple_test', [s]), NOW).files[0].content;
  var need = [
    'vm.tuple_var(name="tuple", ip_min="16.0.0.1", ip_max="16.0.0.2", port_min=1025, port_max=2048, limit_flows=10000)',
    'vm.write(fv_name="tuple.ip", pkt_offset="IP.src")',
    'vm.write(fv_name="tuple.port", pkt_offset="UDP.sport")',
    'vm.fix_chksum()'
  ];
  for (var i = 0; i < need.length; i++) {
    if (c.indexOf(need[i]) === -1) { return { pass: false, detail: 'missing: ' + TB.util.escapeHtml(need[i]) }; }
  }

});

test('version registry: 3.06 resolves, unknown version does not', function () {
  var ok = typeof TB.gen.resolve('3.06', 'stl') === 'function' && TB.gen.resolve('9.99', 'stl') === null;

test('persist: save/load/delete profile round-trip', function () {
  TB.persist.saveProfile(fxMinimal);
  var back = TB.persist.getProfile('stl', 'udp_simple');
  var okSave = back && JSON.stringify(back) === JSON.stringify(fxMinimal);
  TB.persist.deleteProfile('stl', 'udp_simple');
  var okDel = TB.persist.getProfile('stl', 'udp_simple') === null;
  return { pass: !!(okSave && okDel), detail: 'save=' + okSave + ' delete=' + okDel };
});

  return {
    client: { start: '16.0.0.0', end: '16.0.0.255', distribution: 'seq', perCore: null },
    server: { start: '48.0.0.0', end: '48.0.255.255', distribution: 'seq', perCore: null },
    ipOffset: '1.0.0.0'
  };
}
function astfGlobals() {
  function side() {
    return { tcp: { mss: null, rxbufsize: null, txbufsize: null, initwnd: null, no_delay: null,
                    do_rfc1323: null, keepinit: null, keepidle: null, keepintvl: null },
             scheduler: { rampupSec: null }, ipv6: { enable: false, srcMsb: '', dstMsb: '' } };
  }
  return { client: side(), server: side() };
}
function astfModel(name, over) {
  var m = { kind: 'astf', schemaVersion: 1, trexVersion: '3.06',
            meta: { name: name, description: '', modified: '' },
            ipGen: astfIpGen(), globals: astfGlobals(),
            mode: 'pcap', capList: [], templates: [] };
  for (var k in over) { if (Object.prototype.hasOwnProperty.call(over, k)) { m[k] = over[k]; } }
  return m;
}
function httpTemplate(over) {
  var t = {
    id: 't1', tgName: null, cps: 1, assocPort: 80, stream: true,
    client: { commands: [
      { op: 'send', payload: { kind: 'httpRequest' } },

    server: { commands: [

      { op: 'send', payload: { kind: 'httpResponse', bodyBytes: 32768 } }
    ] },
    ipGenOverride: null
  };
  for (var k in over) { if (Object.prototype.hasOwnProperty.call(over, k)) { t[k] = over[k]; } }
  return t;
}

    var r = agen(fixture, NOW);
    if (r.warnings.length) { return { pass: false, detail: 'unexpected warnings: ' + r.warnings.join(' | ') }; }
    if (r.files[0].name !== expectFile) { return { pass: false, detail: 'file name ' + r.files[0].name + ' != ' + expectFile }; }
    if (r.files[0].content === golden) { return { pass: true }; }
    return { pass: false, detail: firstDiff(golden, r.files[0].content) };
  });
}

function astfContains(name, fixture, needles, expectWarnings) {
  test(name, function () {
    var r = agen(fixture, NOW);
    if (!expectWarnings && r.warnings.length) {
      return { pass: false, detail: 'unexpected warnings: ' + r.warnings.join(' | ') };
    }
    var c = r.files[0].content;
    for (var i = 0; i < needles.length; i++) {
      if (c.indexOf(needles[i]) === -1) {
        return { pass: false, detail: 'missing: ' + TB.util.escapeHtml(needles[i]) };
      }
    }
    return { pass: true };
  });
}

tests.forEach(function (t) {
  var out;
  try { out = t.fn(); }
  catch (e) { out = { pass: false, detail: 'threw: ' + TB.util.escapeHtml(e.message) }; }
  var div = document.createElement('div');
  div.className = 'test ' + (out.pass ? 'pass' : 'fail');
  div.innerHTML = (out.pass ? 'PASS ' : 'FAIL ') + TB.util.escapeHtml(t.name) +
    (out.pass || !out.detail ? '' : '<pre class="diff">' + out.detail + '</pre>');
  results.appendChild(div);
  if (out.pass) { passCount++; }
});
document.getElementById('summary').textContent = passCount + ' / ' + tests.length + ' tests passed';
document.getElementById('summary').style.color = passCount === tests.length ? '#3fb950' : '#f85149';
